<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Agent Studio - Wizard.AI Multi-Agent Orchestration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #030614 0%, #0a0f1a 100%);
            color: white;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #c4b5fd, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #9ca3af;
            font-size: 18px;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #8b5cf6;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* Tabs */
        .studio-tabs {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 50px;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #e0e7ff;
        }

        .tab-btn:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: #8b5cf6;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border-color: transparent;
            color: white;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        /* Tab Content */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Run Chain Layout - Two Columns */
        .chain-runner {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .chain-input-panel, .chain-output-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .chain-input-panel h3, .chain-output-panel h3 {
            color: #c4b5fd;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .chain-select, .chain-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .chain-input {
            resize: vertical;
            min-height: 120px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e7ff;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .result-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
        }

        .agent-conversation {
            border-left: 3px solid #8b5cf6;
        }

        .final-work {
            border-left: 3px solid #10b981;
        }

        /* Chains Grid */
        .chains-grid, .agents-grid, .marketplace-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .chain-card, .agent-card, .marketplace-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .chain-card:hover, .agent-card:hover, .marketplace-card:hover {
            transform: translateY(-5px);
            border-color: #8b5cf6;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.2);
        }

        .chain-card h3, .agent-card h3, .marketplace-card h3 {
            font-size: 20px;
            color: #c4b5fd;
            margin-bottom: 10px;
        }

        .chain-card p, .agent-card p, .marketplace-card p {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .chain-steps {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .step-badge {
            background: rgba(139, 92, 246, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
        }

        .agent-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .agent-stats {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            font-size: 12px;
            color: #6b7280;
        }

        /* Custom Chain Builder */
        .chain-builder {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        .builder-step {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .builder-step select {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
        }

        .builder-step button {
            background: rgba(239, 68, 68, 0.2);
            border: none;
            color: #ef4444;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #9ca3af;
            font-size: 14px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6b7280;
        }

        @media (max-width: 1024px) {
            .chain-runner {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 32px; }
            .chains-grid, .agents-grid, .marketplace-grid { grid-template-columns: 1fr; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Agent Studio</h1>
            <p>Multi-Agent Orchestration - Chain specialized AI agents together</p>
            <a href="/" class="back-link">← Back to Wizard.AI</a>
        </div>

        <div class="studio-tabs">
            <button class="tab-btn active" data-tab="run">⚡ Run Chain</button>
            <button class="tab-btn" data-tab="chains">🔗 My Chains</button>
            <button class="tab-btn" data-tab="agents">🤖 Agents</button>
            <button class="tab-btn" data-tab="builder">🛠️ Build Chain</button>
        </div>

        <!-- Run Chain Tab -->
        <div id="run-tab" class="tab-content active">
            <div class="chain-runner">
                <!-- Left Panel: Input -->
                <div class="chain-input-panel">
                    <h3>📝 Input</h3>
                    <select id="chain-select" class="chain-select">
                        <option value="">Select a chain...</option>
                    </select>
                    <textarea id="chain-input" class="chain-input" placeholder="Enter your request..."></textarea>
                    <button id="run-chain-btn" class="btn btn-primary">▶ Run Chain</button>
                </div>

                <!-- Right Panel: Output Split -->
                <div class="chain-output-panel">
                    <h3>📊 Agent Conversation & Findings</h3>
                    <div id="agent-conversation" class="result-area agent-conversation" style="height: 200px; overflow-y: auto;">
                        <div class="loading">Run a chain to see agent conversation...</div>
                    </div>
                    <h3 style="margin-top: 20px;">✨ Final Work</h3>
                    <div id="final-work" class="result-area final-work" style="height: 250px; overflow-y: auto;">
                        <div class="loading">Run a chain to see final output...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- My Chains Tab -->
        <div id="chains-tab" class="tab-content">
            <div class="chains-grid" id="chains-grid">
                <div class="loading">Loading chains...</div>
            </div>
        </div>

        <!-- Agents Tab -->
        <div id="agents-tab" class="tab-content">
            <div class="agents-grid" id="agents-grid">
                <div class="loading">Loading agents...</div>
            </div>
        </div>

        <!-- Build Chain Tab -->
        <div id="builder-tab" class="tab-content">
            <div class="chain-builder">
                <h3 style="color: #c4b5fd; margin-bottom: 15px;">🔧 Create Custom Chain</h3>
                <div class="form-group">
                    <label>Chain Name</label>
                    <input type="text" id="chain-name" placeholder="e.g., My Research Chain">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <input type="text" id="chain-desc" placeholder="What this chain does">
                </div>
                <div class="form-group">
                    <label>Steps</label>
                    <div id="builder-steps">
                        <div class="builder-step">
                            <select class="agent-select">
                                <option value="">Select agent...</option>
                            </select>
                            <button class="remove-step" style="display: none;">🗑️</button>
                        </div>
                    </div>
                    <button id="add-step-btn" class="btn btn-secondary" style="margin-top: 10px;">+ Add Step</button>
                </div>
                <button id="save-chain-btn" class="btn btn-primary">💾 Save Chain</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://arnav0928.pythonanywhere.com';
        let availableAgents = [];

        // Load all data
        async function loadAgents() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/agents/list`, { credentials: 'include' });
                if (response.ok) {
                    const data = await response.json();
                    availableAgents = data.agents || [];
                    const container = document.getElementById('agents-grid');
                    const agentSelects = document.querySelectorAll('.agent-select');
                    
                    if (availableAgents.length === 0) {
                        container.innerHTML = '<div class="loading">No agents available</div>';
                    } else {
                        container.innerHTML = '';
                        availableAgents.forEach(agent => {
                            const card = document.createElement('div');
                            card.className = 'agent-card';
                            card.innerHTML = `
                                <div class="agent-icon">${agent.icon || '🤖'}</div>
                                <h3>${agent.name}</h3>
                                <p>${agent.specialty || 'General purpose'}</p>
                                <div class="agent-stats">
                                    <span>📊 ${agent.usage_count || 0} uses</span>
                                    <span>${agent.is_custom ? '✨ Custom' : '⚡ Built-in'}</span>
                                </div>
                            `;
                            container.appendChild(card);
                        });
                        
                        // Update agent selects
                        agentSelects.forEach(select => {
                            select.innerHTML = '<option value="">Select agent...</option>';
                            availableAgents.forEach(agent => {
                                select.innerHTML += `<option value="${agent.name}">${agent.icon || '🤖'} ${agent.name}</option>`;
                            });
                        });
                    }
                }
            } catch (error) {
                console.error('Error loading agents:', error);
                document.getElementById('agents-grid').innerHTML = '<div class="loading">Error loading agents</div>';
            }
        }

        async function loadChains() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/chains/list`, { credentials: 'include' });
                if (response.ok) {
                    const data = await response.json();
                    const container = document.getElementById('chains-grid');
                    const select = document.getElementById('chain-select');
                    
                    if (!data.chains || data.chains.length === 0) {
                        container.innerHTML = '<div class="loading">No chains yet. Create one in the Build Chain tab!</div>';
                        select.innerHTML = '<option value="">No chains available</option>';
                        return;
                    }
                    
                    container.innerHTML = '';
                    select.innerHTML = '<option value="">Select a chain...</option>';
                    
                    data.chains.forEach(chain => {
                        const card = document.createElement('div');
                        card.className = 'chain-card';
                        card.onclick = () => {
                            document.getElementById('chain-select').value = chain.name;
                            document.querySelector('.tab-btn[data-tab="run"]').click();
                        };
                        card.innerHTML = `
                            <h3>🔗 ${chain.name}</h3>
                            <p>${chain.description || 'No description'}</p>
                            <div class="chain-steps">
                                ${chain.steps ? chain.steps.map(s => `<span class="step-badge">${s.agent}</span>`).join('') : '<span class="step-badge">Ready</span>'}
                            </div>
                            <div class="agent-stats">
                                <span>📊 ${chain.usage_count || 0} runs</span>
                                <span>${chain.is_custom ? '✨ Custom' : '⚡ Built-in'}</span>
                            </div>
                        `;
                        container.appendChild(card);
                        
                        const option = document.createElement('option');
                        option.value = chain.name;
                        option.textContent = chain.name;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading chains:', error);
                document.getElementById('chains-grid').innerHTML = '<div class="loading">Error loading chains</div>';
            }
        }

        // Run Chain
        document.getElementById('run-chain-btn').addEventListener('click', async () => {
            const chainName = document.getElementById('chain-select').value;
            const input = document.getElementById('chain-input').value;
            const conversationDiv = document.getElementById('agent-conversation');
            const finalDiv = document.getElementById('final-work');
            
            if (!chainName) {
                alert('Please select a chain');
                return;
            }
            if (!input) {
                alert('Please enter a request');
                return;
            }
            
            conversationDiv.innerHTML = '<div class="loading">🤖 Running chain...</div>';
            finalDiv.innerHTML = '<div class="loading">✨ Generating final output...</div>';
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/chains/run/${encodeURIComponent(chainName)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ input })
                });
                const data = await response.json();
                
                if (data.results) {
                    // Separate agent conversation from final work
                    let conversation = '';
                    let finalWork = '';
                    
                    for (const [key, value] of Object.entries(data.results)) {
                        if (key === 'final' || key === 'content' || key === 'output') {
                            finalWork = value;
                        } else if (key !== 'error' && value) {
                            conversation += `<strong>🤖 ${key.toUpperCase()} AGENT</strong><br>${value}<br><br>`;
                        }
                    }
                    
                    conversationDiv.innerHTML = conversation || '<i>No agent conversation recorded</i>';
                    finalDiv.innerHTML = finalWork || '<i>No final output generated</i>';
                } else {
                    conversationDiv.innerHTML = '<div class="loading">Error: No results returned</div>';
                    finalDiv.innerHTML = '<div class="loading">Error: No results returned</div>';
                }
            } catch (error) {
                conversationDiv.innerHTML = `<div class="loading">Error: ${error.message}</div>`;
                finalDiv.innerHTML = `<div class="loading">Error: ${error.message}</div>`;
            }
        });

        // Build Chain functionality
        let stepCount = 1;

        function updateAgentSelects() {
            const selects = document.querySelectorAll('.agent-select');
            selects.forEach(select => {
                const currentValue = select.value;
                select.innerHTML = '<option value="">Select agent...</option>';
                availableAgents.forEach(agent => {
                    select.innerHTML += `<option value="${agent.name}" ${agent.name === currentValue ? 'selected' : ''}>${agent.icon || '🤖'} ${agent.name}</option>`;
                });
            });
        }

        document.getElementById('add-step-btn').addEventListener('click', () => {
            const stepsDiv = document.getElementById('builder-steps');
            const stepDiv = document.createElement('div');
            stepDiv.className = 'builder-step';
            stepDiv.innerHTML = `
                <select class="agent-select">
                    <option value="">Select agent...</option>
                </select>
                <button class="remove-step">🗑️</button>
            `;
            stepsDiv.appendChild(stepDiv);
            updateAgentSelects();
            
            stepDiv.querySelector('.remove-step').addEventListener('click', () => {
                stepDiv.remove();
            });
        });

        document.getElementById('save-chain-btn').addEventListener('click', async () => {
            const name = document.getElementById('chain-name').value;
            const description = document.getElementById('chain-desc').value;
            const steps = [];
            
            document.querySelectorAll('.builder-step').forEach(step => {
                const agentName = step.querySelector('.agent-select').value;
                if (agentName) {
                    steps.push({ agent: agentName, input_key: 'query', output_key: agentName.toLowerCase() });
                }
            });
            
            if (!name || steps.length === 0) {
                alert('Please enter a chain name and at least one step');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/chains/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ name, description, steps })
                });
                if (response.ok) {
                    alert('✅ Chain saved successfully!');
                    document.getElementById('chain-name').value = '';
                    document.getElementById('chain-desc').value = '';
                    document.getElementById('builder-steps').innerHTML = `
                        <div class="builder-step">
                            <select class="agent-select">
                                <option value="">Select agent...</option>
                            </select>
                            <button class="remove-step" style="display: none;">🗑️</button>
                        </div>
                    `;
                    stepCount = 1;
                    updateAgentSelects();
                    loadChains();
                } else {
                    alert('Failed to save chain');
                }
            } catch (error) {
                alert('Error saving chain');
            }
        });

        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`${btn.dataset.tab}-tab`).classList.add('active');
                
                if (btn.dataset.tab === 'builder') {
                    updateAgentSelects();
                }
            });
        });

        // Initialize
        loadAgents();
        loadChains();
    </script>
</body>
</html>
