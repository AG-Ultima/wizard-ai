<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chain Studio - Wizard.AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #030614 0%, #0a0f1a 100%);
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 48px; background: linear-gradient(135deg, #c4b5fd, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .chains-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .chain-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; border: 1px solid rgba(139,92,246,0.3); transition: all 0.3s; cursor: pointer; }
        .chain-card:hover { transform: translateY(-5px); border-color: #8b5cf6; box-shadow: 0 0 30px rgba(139,92,246,0.2); }
        .chain-card h3 { font-size: 24px; margin-bottom: 10px; color: #c4b5fd; }
        .chain-card p { color: #9ca3af; margin-bottom: 15px; }
        .chain-steps { display: flex; gap: 10px; flex-wrap: wrap; }
        .step-badge { background: rgba(139,92,246,0.2); padding: 5px 12px; border-radius: 20px; font-size: 12px; }
        .executor-panel { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 30px; border: 1px solid rgba(139,92,246,0.3); }
        .executor-panel h2 { margin-bottom: 20px; color: #c4b5fd; }
        .executor-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .executor-row select, .executor-row input { flex: 1; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid rgba(139,92,246,0.3); border-radius: 12px; color: white; }
        .btn { padding: 14px 28px; border-radius: 50px; border: none; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(139,92,246,0.5); }
        .results { margin-top: 20px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 16px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; font-family: monospace; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #8b5cf6; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔗 Chain Studio</h1>
            <p>Run multi-agent workflows</p>
        </div>

        <div class="chains-grid" id="chainsGrid">
            <div style="text-align: center; padding: 40px; color: #6b7280;">Loading chains...</div>
        </div>

        <div class="executor-panel">
            <h2>⚡ Run a Chain</h2>
            <div class="executor-row">
                <select id="chainSelect">
                    <option value="">Select a chain...</option>
                </select>
                <input type="text" id="chainInput" placeholder="Enter your request...">
                <button class="btn btn-primary" id="runChainBtn">▶ Run Chain</button>
            </div>
            <div id="chainResults" class="results" style="display: none;"></div>
        </div>
    </div>

    <script>
        async function loadChains() {
            try {
                const response = await fetch('/api/chains/list', { credentials: 'include' });
                const data = await response.json();
                const container = document.getElementById('chainsGrid');
                const select = document.getElementById('chainSelect');
                
                container.innerHTML = '';
                select.innerHTML = '<option value="">Select a chain...</option>';
                
                data.chains.forEach(chain => {
                    // Add to grid
                    const card = document.createElement('div');
                    card.className = 'chain-card';
                    card.onclick = () => {
                        document.getElementById('chainSelect').value = chain.name;
                        document.getElementById('chainInput').focus();
                    };
                    card.innerHTML = `
                        <h3>🔗 ${chain.name}</h3>
                        <p>${chain.description || 'No description'}</p>
                        <div class="chain-steps">
                            ${chain.steps ? chain.steps.map(s => `<span class="step-badge">${s.agent}</span>`).join('') : '<span class="step-badge">Ready</span>'}
                        </div>
                    `;
                    container.appendChild(card);
                    
                    // Add to select
                    const option = document.createElement('option');
                    option.value = chain.name;
                    option.textContent = chain.name;
                    select.appendChild(option);
                });
            } catch(e) {
                console.error('Error loading chains:', e);
                document.getElementById('chainsGrid').innerHTML = '<div style="text-align: center; padding: 40px; color: #ef4444;">Failed to load chains</div>';
            }
        }

        document.getElementById('runChainBtn').addEventListener('click', async () => {
            const chainName = document.getElementById('chainSelect').value;
            const input = document.getElementById('chainInput').value;
            
            if (!chainName) {
                alert('Please select a chain');
                return;
            }
            if (!input) {
                alert('Please enter a request');
                return;
            }
            
            const resultsDiv = document.getElementById('chainResults');
            resultsDiv.style.display = 'block';
            resultsDiv.innerHTML = '<div class="loading"></div> Running chain...';
            
            try {
                const response = await fetch(`/api/chains/run/${chainName}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ input })
                });
                const data = await response.json();
                
                if (data.results && data.results.output) {
                    resultsDiv.innerHTML = data.results.output;
                } else if (data.results) {
                    let html = '';
                    for (const [key, value] of Object.entries(data.results)) {
                        if (value && key !== 'output') {
                            html += `<strong>${key.toUpperCase()}</strong>\n${value}\n\n---\n\n`;
                        }
                    }
                    resultsDiv.innerHTML = html || 'No output generated';
                } else {
                    resultsDiv.innerHTML = 'Error: No results returned';
                }
            } catch(e) {
                resultsDiv.innerHTML = 'Error running chain: ' + e.message;
            }
        });
        
        loadChains();
    </script>
</body>
</html>
