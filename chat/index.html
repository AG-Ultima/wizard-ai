<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧙 Wizard Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        [data-theme="purple"] {
            --bg-primary: #0d0d1a;
            --bg-secondary: #12122a;
            --bg-card: rgba(18,18,42,0.95);
            --text-primary: #ffffff;
            --text-secondary: #d8d4ff;
            --text-muted: #9a94c4;
            --border: rgba(139,92,246,0.25);
            --primary: #a78bfa;
            --primary-dark: #7c3aed;
            --primary-light: #c4b5fd;
            --danger: #ef4444;
            --success: #10b981;
        }
        
        [data-theme="dark"] {
            --bg-primary: #0a0a1a;
            --bg-secondary: #0f0f23;
            --bg-card: rgba(20,20,40,0.95);
            --text-primary: #ffffff;
            --text-secondary: #c4c4e0;
            --text-muted: #8888aa;
            --border: rgba(139,92,246,0.2);
            --primary: #8b5cf6;
            --primary-dark: #6d28d9;
            --primary-light: #c4b5fd;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }
        
        .chat-container {
            display: flex;
            height: 100vh;
        }
        
        .conversations-sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .logo-icon { font-size: 32px; }
        .logo h1 {
            font-size: 20px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(139,92,246,0.1);
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .user-name { font-weight: 600; }
        .user-email { font-size: 11px; color: var(--text-muted); }
        
        .new-chat-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 24px;
            padding: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        
        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        
        .conversation-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 4px;
        }
        
        .conversation-item:hover { background: rgba(139,92,246,0.1); }
        .conversation-item.active {
            background: rgba(139,92,246,0.2);
            border-left: 3px solid var(--primary);
        }
        
        .conversation-avatar {
            width: 48px;
            height: 48px;
            background: rgba(139,92,246,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .conversation-info { flex: 1; }
        .conversation-name { font-weight: 600; margin-bottom: 4px; }
        .conversation-last-msg { font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .conversation-time { font-size: 10px; color: var(--text-muted); }
        .conversation-unread {
            background: var(--primary);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
        }
        
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-area-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-area-title { display: flex; align-items: center; gap: 12px; }
        .chat-avatar {
            width: 40px;
            height: 40px;
            background: rgba(139,92,246,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            display: flex;
            gap: 12px;
            max-width: 70%;
            animation: fadeIn 0.3s ease;
        }
        .message.own { align-self: flex-end; flex-direction: row-reverse; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .message.own .message-avatar { background: var(--success); }
        
        .message-bubble {
            background: rgba(139,92,246,0.15);
            border-radius: 18px;
            padding: 10px 16px;
            font-size: 14px;
            line-height: 1.5;
        }
        .message.own .message-bubble {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        
        .message-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
        .message.own .message-time { text-align: right; }
        
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }
        
        .chat-input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 12px 18px;
            color: var(--text-primary);
            resize: none;
            font-family: inherit;
            font-size: 14px;
        }
        .chat-input:focus { outline: none; border-color: var(--primary); }
        
        .send-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 24px;
            padding: 0 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        .empty-state-icon { font-size: 60px; margin-bottom: 20px; }
        
        .new-chat-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .new-chat-modal.show { display: flex; }
        
        .new-chat-card {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 24px;
            width: 400px;
            max-width: 90%;
        }
        
        .new-chat-card input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-primary);
            margin-bottom: 16px;
        }
        
        .search-results { max-height: 300px; overflow-y: auto; margin-top: 16px; }
        .search-result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
        }
        .search-result-item:hover { background: rgba(139,92,246,0.1); }
        
        .loading { text-align: center; padding: 60px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="conversations-sidebar">
            <div class="chat-header">
                <div class="logo">
                    <span class="logo-icon">💬</span>
                    <h1>Wizard Chat</h1>
                </div>
                
                <div class="user-info">
                    <div class="user-avatar">🧙</div>
                    <div>
                        <div class="user-name" id="user-name">Loading...</div>
                        <div class="user-email" id="user-email">Loading...</div>
                    </div>
                </div>
                
                <button class="new-chat-btn" id="new-chat-btn">+ New Chat</button>
            </div>
            
            <div class="conversations-list" id="conversations-list">
                <div class="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <p>No conversations yet</p>
                </div>
            </div>
        </div>
        
        <div class="chat-area" id="chat-area">
            <div class="chat-area-header">
                <div class="chat-area-title">
                    <div class="chat-avatar" id="chat-avatar">🧙</div>
                    <div>
                        <div id="chat-name" style="font-weight: 600;">Select a chat</div>
                        <div id="chat-status" style="font-size: 11px; color: var(--text-muted);">Click a conversation to start</div>
                    </div>
                </div>
            </div>
            
            <div class="messages-area" id="messages-area">
                <div class="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <p>Select a conversation to start messaging</p>
                </div>
            </div>
            
            <div class="chat-input-area">
                <textarea class="chat-input" id="message-input" placeholder="Type a message..." rows="1"></textarea>
                <button class="send-btn" id="send-btn">Send</button>
            </div>
        </div>
    </div>
    
    <div id="new-chat-modal" class="new-chat-modal">
        <div class="new-chat-card">
            <h3 style="margin-bottom: 16px;">New Conversation</h3>
            <input type="text" id="search-users" placeholder="Search by email...">
            <div id="search-results" class="search-results"></div>
            <button id="close-new-chat" style="margin-top: 16px; background: none; border: none; color: var(--text-muted); cursor: pointer;">Cancel</button>
        </div>
    </div>

    <script>
        const API_BASE = 'https://arnav0928.pythonanywhere.com';
        let currentUser = null;
        let conversations = [];
        let currentConversationId = null;
        let messages = [];
        let pollingInterval = null;
        
        async function checkAuth() {
            try {
                const response = await fetch(`${API_BASE}/api/check-auth`, { credentials: 'include' });
                if (response.ok) {
                    const data = await response.json();
                    if (data.authenticated && data.user) {
                        currentUser = data.user;
                        document.getElementById('user-name').textContent = `${currentUser.first_name || ''} ${currentUser.last_name || ''}`.trim() || currentUser.email;
                        document.getElementById('user-email').textContent = currentUser.email;
                        await loadConversations();
                        startPolling();
                        return;
                    }
                }
            } catch(e) {}
            window.location.href = 'https://wizardai.dpdns.org';
        }
        
        async function loadConversations() {
            try {
                const response = await fetch(`${API_BASE}/api/chat/conversations`, { credentials: 'include' });
                if (response.ok) {
                    const data = await response.json();
                    conversations = data.conversations || [];
                    renderConversations();
                }
            } catch(e) {}
        }
        
        async function loadMessages(conversationId) {
            try {
                const response = await fetch(`${API_BASE}/api/chat/messages/${conversationId}`, { credentials: 'include' });
                if (response.ok) {
                    const data = await response.json();
                    messages = data.messages || [];
                    renderMessages();
                }
            } catch(e) {}
        }
        
        async function sendMessage() {
            const content = document.getElementById('message-input').value.trim();
            if (!content || !currentConversationId) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/chat/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ conversation_id: currentConversationId, content: content })
                });
                if (response.ok) {
                    document.getElementById('message-input').value = '';
                    await loadMessages(currentConversationId);
                    await loadConversations();
                }
            } catch(e) {}
        }
        
        async function createConversation(userId) {
            try {
                const response = await fetch(`${API_BASE}/api/chat/conversations`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ participant_id: userId })
                });
                if (response.ok) {
                    const data = await response.json();
                    await loadConversations();
                    openConversation(data.conversation.id);
                    document.getElementById('new-chat-modal').classList.remove('show');
                }
            } catch(e) {}
        }
        
        async function searchUsers(query) {
            if (!query || query.length < 2) {
                document.getElementById('search-results').innerHTML = '';
                return;
            }
            try {
                const response = await fetch(`${API_BASE}/api/users/search?q=${encodeURIComponent(query)}`, { credentials: 'include' });
                if (response.ok) {
                    const data = await response.json();
                    renderSearchResults(data.users);
                }
            } catch(e) {}
        }
        
        function renderConversations() {
            const container = document.getElementById('conversations-list');
            if (!conversations.length) {
                container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">💬</div><p>No conversations yet</p></div>`;
                return;
            }
            
            container.innerHTML = conversations.map(conv => `
                <div class="conversation-item ${currentConversationId === conv.id ? 'active' : ''}" data-id="${conv.id}">
                    <div class="conversation-avatar">👤</div>
                    <div class="conversation-info">
                        <div class="conversation-name">${escapeHtml(conv.name)}</div>
                        <div class="conversation-last-msg">${escapeHtml(conv.last_message || 'No messages yet')}</div>
                    </div>
                    <div class="conversation-time">${conv.last_message_time ? formatTime(conv.last_message_time) : ''}</div>
                    ${conv.unread_count > 0 ? `<div class="conversation-unread">${conv.unread_count}</div>` : ''}
                </div>
            `).join('');
            
            document.querySelectorAll('.conversation-item').forEach(item => {
                item.onclick = () => openConversation(parseInt(item.dataset.id));
            });
        }
        
        function renderMessages() {
            const container = document.getElementById('messages-area');
            if (!messages.length) {
                container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">💬</div><p>No messages yet</p></div>`;
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.sender_id === currentUser?.id ? 'own' : ''}">
                    <div class="message-avatar">${msg.sender_id === currentUser?.id ? '👤' : '🧙'}</div>
                    <div>
                        <div class="message-bubble">${escapeHtml(msg.content)}</div>
                        <div class="message-time">${formatTime(msg.created_at)}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function renderSearchResults(users) {
            const container = document.getElementById('search-results');
            if (!users || !users.length) {
                container.innerHTML = '<div style="text-align: center; padding: 20px;">No users found</div>';
                return;
            }
            container.innerHTML = users.map(user => `
                <div class="search-result-item" data-id="${user.id}">
                    <div class="conversation-avatar" style="width: 40px; height: 40px;">👤</div>
                    <div>
                        <div style="font-weight: 500;">${escapeHtml(user.name || user.email)}</div>
                        <div style="font-size: 11px; color: var(--text-muted);">${escapeHtml(user.email)}</div>
                    </div>
                </div>
            `).join('');
            document.querySelectorAll('.search-result-item').forEach(item => {
                item.onclick = () => createConversation(parseInt(item.dataset.id));
            });
        }
        
        function openConversation(conversationId) {
            currentConversationId = conversationId;
            const conv = conversations.find(c => c.id === conversationId);
            if (conv) {
                document.getElementById('chat-name').textContent = conv.name;
                document.getElementById('chat-status').textContent = 'Online';
            }
            loadMessages(conversationId);
            renderConversations();
        }
        
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            if (diff < 24*60*60*1000) return date.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
            if (diff < 7*24*60*60*1000) return date.toLocaleDateString([], { weekday:'short' });
            return date.toLocaleDateString([], { month:'short', day:'numeric' });
        }
        
        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(async () => {
                await loadConversations();
                if (currentConversationId) await loadMessages(currentConversationId);
            }, 3000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('new-chat-btn').onclick = () => document.getElementById('new-chat-modal').classList.add('show');
        document.getElementById('close-new-chat').onclick = () => document.getElementById('new-chat-modal').classList.remove('show');
        document.getElementById('search-users').oninput = (e) => searchUsers(e.target.value);
        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('message-input').onkeypress = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
        
        checkAuth();
    </script>
</body>
</html>
