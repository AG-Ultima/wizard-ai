<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧙 Wizard Calendar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        [data-theme="purple"] {
            --bg-primary: #0d0d1a;
            --bg-secondary: #12122a;
            --bg-card: rgba(18,18,42,0.95);
            --text-primary: #ffffff;
            --text-secondary: #d8d4ff;
            --text-muted: #9a94c4;
            --border: rgba(139,92,246,0.25);
            --primary: #a78bfa;
            --primary-dark: #7c3aed;
            --primary-light: #c4b5fd;
            --danger: #ef4444;
            --success: #10b981;
        }
        
        [data-theme="dark"] {
            --bg-primary: #0a0a1a;
            --bg-secondary: #0f0f23;
            --bg-card: rgba(20,20,40,0.95);
            --text-primary: #ffffff;
            --text-secondary: #c4c4e0;
            --text-muted: #8888aa;
            --border: rgba(139,92,246,0.2);
            --primary: #8b5cf6;
            --primary-dark: #6d28d9;
            --primary-light: #c4b5fd;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }
        
        .calendar-container {
            display: flex;
            height: 100vh;
        }
        
        .calendar-sidebar {
            width: 300px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            padding: 20px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .logo-icon { font-size: 32px; }
        .logo h1 {
            font-size: 20px;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .user-info {
            background: rgba(139,92,246,0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .user-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 12px;
        }
        
        .user-email {
            font-size: 11px;
            color: var(--primary-light);
        }
        
        .mini-calendar {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .mini-calendar-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        
        .mini-calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }
        
        .mini-calendar-day {
            padding: 6px;
            font-size: 12px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .mini-calendar-day.today { background: var(--primary); color: white; }
        .mini-calendar-day.has-event { background: rgba(167,139,250,0.3); font-weight: bold; }
        
        .create-event-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 24px;
            padding: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .calendar-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .calendar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .month-nav { display: flex; gap: 16px; align-items: center; }
        .month-nav button {
            background: rgba(139,92,246,0.2);
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            color: white;
            cursor: pointer;
        }
        
        .view-buttons { display: flex; gap: 8px; }
        .view-btn {
            background: rgba(139,92,246,0.15);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 16px;
            cursor: pointer;
        }
        .view-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-color: transparent;
        }
        
        .calendar-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 80px repeat(7, 1fr);
            overflow: auto;
        }
        
        .time-column { border-right: 1px solid var(--border); }
        .time-slot {
            height: 60px;
            padding: 8px;
            font-size: 12px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }
        
        .day-column { border-right: 1px solid var(--border); position: relative; }
        .day-header {
            height: 40px;
            padding: 8px;
            text-align: center;
            font-weight: 500;
            border-bottom: 1px solid var(--border);
        }
        .hour-cell {
            height: 60px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            position: relative;
        }
        .hour-cell:hover { background: rgba(139,92,246,0.05); }
        
        .event {
            position: absolute;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 11px;
            overflow: hidden;
            cursor: pointer;
            left: 2px;
            right: 2px;
            z-index: 10;
        }
        
        .event-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .event-modal.show { display: flex; }
        
        .event-card {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 24px;
            width: 400px;
            max-width: 90%;
        }
        
        .event-card input, .event-card textarea, .event-card select {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-primary);
            margin-bottom: 12px;
        }
        .event-card textarea { height: 100px; resize: vertical; }
        
        .event-actions { display: flex; gap: 12px; margin-top: 20px; }
        .save-event-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 24px;
            padding: 10px 24px;
            color: white;
            cursor: pointer;
        }
        .delete-event-btn {
            background: rgba(239,68,68,0.2);
            border: 1px solid var(--danger);
            border-radius: 24px;
            padding: 10px 24px;
            color: var(--danger);
            cursor: pointer;
        }
        
        .loading { text-align: center; padding: 60px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="calendar-container">
        <div class="calendar-sidebar">
            <div class="logo">
                <span class="logo-icon">📅</span>
                <h1>Wizard Calendar</h1>
            </div>
            
            <div class="user-info">
                <div class="user-avatar">🧙</div>
                <div>
                    <div id="user-email" class="user-email">Loading...</div>
                </div>
            </div>
            
            <div class="mini-calendar" id="mini-calendar"></div>
            <button class="create-event-btn" id="create-event-btn">+ Create Event</button>
        </div>
        
        <div class="calendar-main">
            <div class="calendar-header">
                <div class="month-nav">
                    <button id="prev-month">←</button>
                    <h2 id="current-month">March 2026</h2>
                    <button id="next-month">→</button>
                </div>
                <div class="view-buttons">
                    <button class="view-btn active" data-view="month">Month</button>
                    <button class="view-btn" data-view="week">Week</button>
                    <button class="view-btn" data-view="day">Day</button>
                </div>
            </div>
            
            <div id="calendar-grid" class="calendar-grid">
                <div class="loading">Loading calendar...</div>
            </div>
        </div>
    </div>
    
    <div id="event-modal" class="event-modal">
        <div class="event-card">
            <h3 id="event-modal-title">New Event</h3>
            <input type="text" id="event-title" placeholder="Event title">
            <input type="datetime-local" id="event-start">
            <input type="datetime-local" id="event-end">
            <select id="event-color">
                <option value="purple">💜 Purple</option>
                <option value="blue">💙 Blue</option>
                <option value="green">💚 Green</option>
                <option value="red">❤️ Red</option>
                <option value="yellow">💛 Yellow</option>
            </select>
            <textarea id="event-description" placeholder="Description"></textarea>
            <div class="event-actions">
                <button class="save-event-btn" id="save-event">Save</button>
                <button class="delete-event-btn" id="delete-event" style="display: none;">Delete</button>
                <button id="close-event-modal" style="background: none; border: none; color: var(--text-muted); cursor: pointer;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://arnav0928.pythonanywhere.com';
        let currentUser = null;
        let events = [];
        let currentDate = new Date();
        let currentView = 'month';
        let editingEventId = null;
        
        async function checkAuth() {
            try {
                const response = await fetch(`${API_BASE}/api/check-auth`, { credentials: 'include' });
                if (response.ok) {
                    const data = await response.json();
                    if (data.authenticated && data.user) {
                        currentUser = data.user;
                        document.getElementById('user-email').textContent = currentUser.email;
                        await loadEvents();
                        renderCalendar();
                        return;
                    }
                }
            } catch(e) {}
            window.location.href = 'https://wizardai.dpdns.org';
        }
        
        async function loadEvents() {
            try {
                const response = await fetch(`${API_BASE}/api/calendar/events`, { credentials: 'include' });
                if (response.ok) {
                    const data = await response.json();
                    events = data.events || [];
                    renderCalendar();
                    renderMiniCalendar();
                }
            } catch(e) {}
        }
        
        async function saveEvent(eventData) {
            const method = editingEventId ? 'PUT' : 'POST';
            const url = editingEventId ? `${API_BASE}/api/calendar/events/${editingEventId}` : `${API_BASE}/api/calendar/events`;
            
            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(eventData)
                });
                if (response.ok) {
                    await loadEvents();
                    return true;
                }
            } catch(e) {}
            return false;
        }
        
        async function deleteEvent(eventId) {
            try {
                const response = await fetch(`${API_BASE}/api/calendar/events/${eventId}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });
                if (response.ok) {
                    await loadEvents();
                    return true;
                }
            } catch(e) {}
            return false;
        }
        
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('current-month').textContent = `${currentDate.toLocaleString('default', { month: 'long' })} ${year}`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            let html = `<div class="time-column"><div class="day-header"></div>`;
            for (let h = 0; h < 24; h++) html += `<div class="time-slot">${h}:00</div>`;
            html += `</div>`;
            
            for (let d = 0; d < 7; d++) {
                html += `<div class="day-column"><div class="day-header">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d]}</div><div class="day-cells">`;
                for (let h = 0; h < 24; h++) html += `<div class="hour-cell" data-day="${d}" data-hour="${h}"></div>`;
                html += `</div></div>`;
            }
            
            document.getElementById('calendar-grid').innerHTML = html;
            
            // Add events
            for (let i = 0; i < daysInMonth; i++) {
                const dayOfWeek = (firstDay + i) % 7;
                const date = new Date(year, month, i + 1);
                const dayEvents = events.filter(e => new Date(e.start).toDateString() === date.toDateString());
                
                dayEvents.forEach(event => {
                    const eventHour = new Date(event.start).getHours();
                    const cell = document.querySelector(`.day-column:nth-child(${dayOfWeek + 2}) .hour-cell[data-hour="${eventHour}"]`);
                    if (cell) {
                        const eventDiv = document.createElement('div');
                        eventDiv.className = 'event';
                        eventDiv.textContent = event.title;
                        eventDiv.style.background = getEventColor(event.color);
                        eventDiv.onclick = (e) => { e.stopPropagation(); openEditEventModal(event.id); };
                        cell.parentElement.appendChild(eventDiv);
                    }
                });
            }
            
            document.querySelectorAll('.hour-cell').forEach(cell => {
                cell.onclick = () => {
                    const day = parseInt(cell.dataset.day);
                    const hour = parseInt(cell.dataset.hour);
                    const date = getDateFromDayOffset(day, year, month);
                    openCreateEventModal(date, hour);
                };
            });
        }
        
        function getDateFromDayOffset(dayOffset, year, month) {
            const firstDay = new Date(year, month, 1).getDay();
            let day = 1 + (dayOffset - firstDay);
            if (day < 1) return new Date(year, month - 1, new Date(year, month, 0).getDate() + day);
            if (day > new Date(year, month + 1, 0).getDate()) return new Date(year, month + 1, day - new Date(year, month + 1, 0).getDate());
            return new Date(year, month, day);
        }
        
        function renderMiniCalendar() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            let html = `<div class="mini-calendar-header"><span>${now.toLocaleString('default', { month: 'long' })} ${year}</span></div>
                <div class="mini-calendar-grid">${['S','M','T','W','T','F','S'].map(d => `<div>${d}</div>`).join('')}`;
            
            for (let i = 0; i < firstDay; i++) html += `<div></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const hasEvent = events.some(e => new Date(e.start).toDateString() === new Date(year, month, d).toDateString());
                const isToday = d === now.getDate();
                html += `<div class="mini-calendar-day ${isToday ? 'today' : ''} ${hasEvent ? 'has-event' : ''}" data-day="${d}">${d}</div>`;
            }
            html += `</div>`;
            document.getElementById('mini-calendar').innerHTML = html;
            
            document.querySelectorAll('.mini-calendar-day[data-day]').forEach(day => {
                day.onclick = () => { currentDate = new Date(year, month, parseInt(day.dataset.day)); renderCalendar(); };
            });
        }
        
        function getEventColor(color) {
            const colors = { purple: '#a78bfa', blue: '#60a5fa', green: '#34d399', red: '#f87171', yellow: '#fbbf24' };
            return colors[color] || colors.purple;
        }
        
        function openCreateEventModal(date, hour) {
            editingEventId = null;
            document.getElementById('event-modal-title').textContent = 'New Event';
            document.getElementById('delete-event').style.display = 'none';
            
            const start = new Date(date);
            start.setHours(hour, 0, 0);
            const end = new Date(start);
            end.setHours(hour + 1, 0, 0);
            
            document.getElementById('event-start').value = start.toISOString().slice(0, 16);
            document.getElementById('event-end').value = end.toISOString().slice(0, 16);
            document.getElementById('event-title').value = '';
            document.getElementById('event-description').value = '';
            document.getElementById('event-color').value = 'purple';
            document.getElementById('event-modal').classList.add('show');
        }
        
        function openEditEventModal(eventId) {
            const event = events.find(e => e.id === eventId);
            if (!event) return;
            editingEventId = eventId;
            document.getElementById('event-modal-title').textContent = 'Edit Event';
            document.getElementById('delete-event').style.display = 'block';
            document.getElementById('event-title').value = event.title;
            document.getElementById('event-start').value = event.start.slice(0, 16);
            document.getElementById('event-end').value = event.end.slice(0, 16);
            document.getElementById('event-description').value = event.description || '';
            document.getElementById('event-color').value = event.color || 'purple';
            document.getElementById('event-modal').classList.add('show');
        }
        
        async function saveCurrentEvent() {
            const eventData = {
                title: document.getElementById('event-title').value,
                start: document.getElementById('event-start').value,
                end: document.getElementById('event-end').value,
                description: document.getElementById('event-description').value,
                color: document.getElementById('event-color').value
            };
            if (!eventData.title || !eventData.start || !eventData.end) {
                alert('Please fill in title, start time, and end time');
                return;
            }
            if (await saveEvent(eventData)) {
                document.getElementById('event-modal').classList.remove('show');
                renderCalendar();
                renderMiniCalendar();
            } else {
                alert('Failed to save event');
            }
        }
        
        async function deleteCurrentEvent() {
            if (!editingEventId) return;
            if (confirm('Delete this event?')) {
                if (await deleteEvent(editingEventId)) {
                    document.getElementById('event-modal').classList.remove('show');
                    renderCalendar();
                    renderMiniCalendar();
                } else {
                    alert('Failed to delete event');
                }
            }
        }
        
        document.getElementById('prev-month').onclick = () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); };
        document.getElementById('next-month').onclick = () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); };
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentView = btn.dataset.view;
                renderCalendar();
            };
        });
        document.getElementById('create-event-btn').onclick = () => openCreateEventModal(new Date(), 9);
        document.getElementById('save-event').onclick = saveCurrentEvent;
        document.getElementById('delete-event').onclick = deleteCurrentEvent;
        document.getElementById('close-event-modal').onclick = () => document.getElementById('event-modal').classList.remove('show');
        
        checkAuth();
    </script>
</body>
</html>
