<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Marketplace - Wizard.AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #030614 0%, #0a0f1a 100%);
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 48px; background: linear-gradient(135deg, #c4b5fd, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .filters { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(139,92,246,0.3); padding: 10px 24px; border-radius: 50px; cursor: pointer; transition: all 0.3s; }
        .filter-btn:hover, .filter-btn.active { background: linear-gradient(135deg, #8b5cf6, #6d28d9); border-color: transparent; }
        .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .agent-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; border: 1px solid rgba(139,92,246,0.3); transition: all 0.3s; }
        .agent-card:hover { transform: translateY(-5px); border-color: #8b5cf6; box-shadow: 0 0 30px rgba(139,92,246,0.2); }
        .agent-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .agent-icon { font-size: 48px; }
        .agent-name { font-size: 24px; font-weight: bold; color: #c4b5fd; }
        .agent-specialty { color: #9ca3af; margin-bottom: 15px; font-size: 14px; }
        .agent-description { color: #e0e7ff; margin-bottom: 20px; line-height: 1.5; }
        .agent-stats { display: flex; gap: 20px; margin-bottom: 20px; font-size: 12px; color: #6b7280; }
        .btn-install { width: 100%; padding: 12px; background: linear-gradient(135deg, #10b981, #059669); border: none; border-radius: 50px; color: white; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-install:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(16,185,129,0.5); }
        .btn-install.installed { background: #374151; cursor: default; }
        .btn-install.installed:hover { transform: none; box-shadow: none; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 40px; }
        .page-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(139,92,246,0.3); padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .page-btn.active { background: #8b5cf6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 Agent Marketplace</h1>
            <p>Discover and install community-built AI agents</p>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="research">🔍 Research</button>
            <button class="filter-btn" data-filter="writing">✍️ Writing</button>
            <button class="filter-btn" data-filter="coding">💻 Coding</button>
            <button class="filter-btn" data-filter="design">🎨 Design</button>
            <button class="filter-btn" data-filter="data">📊 Data</button>
        </div>

        <div id="agentsGrid" class="agents-grid">
            <div style="text-align: center; padding: 40px; color: #6b7280;">Loading agents...</div>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        let allAgents = [];
        let currentFilter = 'all';
        let currentPage = 1;
        const agentsPerPage = 9;

        async function loadMarketplaceAgents() {
            try {
                const response = await fetch('/api/marketplace/agents', { credentials: 'include' });
                const data = await response.json();
                allAgents = data.agents || [];
                renderAgents();
            } catch(e) {
                console.error('Error loading marketplace:', e);
                document.getElementById('agentsGrid').innerHTML = '<div style="text-align: center; padding: 40px; color: #ef4444;">Failed to load marketplace</div>';
            }
        }

        function renderAgents() {
            let filtered = allAgents;
            if (currentFilter !== 'all') {
                filtered = allAgents.filter(a => a.category === currentFilter);
            }
            
            const start = (currentPage - 1) * agentsPerPage;
            const paginated = filtered.slice(start, start + agentsPerPage);
            
            const container = document.getElementById('agentsGrid');
            if (paginated.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 40px; color: #6b7280;">No agents found</div>';
                return;
            }
            
            container.innerHTML = '';
            paginated.forEach(agent => {
                const card = document.createElement('div');
                card.className = 'agent-card';
                card.innerHTML = `
                    <div class="agent-header">
                        <div class="agent-icon">${agent.icon || '🤖'}</div>
                        <div class="agent-name">${agent.name}</div>
                    </div>
                    <div class="agent-specialty">${agent.specialty || 'General purpose'}</div>
                    <div class="agent-description">${agent.description || 'No description available'}</div>
                    <div class="agent-stats">
                        <span>📥 ${agent.installs || 0} installs</span>
                        <span>⭐ ${agent.rating || 0}/5</span>
                        <span>👤 by ${agent.creator || 'Anonymous'}</span>
                    </div>
                    <button class="btn-install ${agent.installed ? 'installed' : ''}" data-agent-id="${agent.id}">
                        ${agent.installed ? '✅ Installed' : '➕ Install'}
                    </button>
                `;
                container.appendChild(card);
                
                const btn = card.querySelector('.btn-install');
                if (!agent.installed) {
                    btn.addEventListener('click', () => installAgent(agent.id));
                }
            });
            
            renderPagination(filtered.length);
        }

        function renderPagination(total) {
            const totalPages = Math.ceil(total / agentsPerPage);
            const container = document.getElementById('pagination');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
            }
            container.innerHTML = html;
            
            container.querySelectorAll('.page-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentPage = parseInt(btn.dataset.page);
                    renderAgents();
                });
            });
        }

        async function installAgent(agentId) {
            try {
                const response = await fetch('/api/marketplace/install', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ agent_id: agentId })
                });
                if (response.ok) {
                    alert('✅ Agent installed successfully!');
                    loadMarketplaceAgents();
                } else {
                    alert('Failed to install agent');
                }
            } catch(e) {
                alert('Error installing agent');
            }
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                currentPage = 1;
                renderAgents();
            });
        });

        loadMarketplaceAgents();
    </script>
</body>
</html>
